name: Auto Deploy to Linode

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build Up Image And Push
    runs-on: ubuntu-latest
    steps:
          - name: Checkout Repository
            uses: actions/checkout@v3

          - name: Log in to Docker Hub
            uses: docker/login-action@v2
            with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v2

          # Backend Image Build & Push
          - name: Build and Push Backend Docker Image
            uses: docker/build-push-action@v5
            with:
              context: ./backend-django
              push: true
              # tags: fishlo/fishlo-docker-backend-django:latest
              tags: |
                fishlo/fishlo-docker-backend-django:latest
                fishlo/fishlo-docker-backend-django:${{ github.sha }}
              cache-from: type=registry,ref=fishlo/fishlo-docker-backend-django:latest
              cache-to: type=inline
            

          # Frontend Image Build & Push
          - name: Build and Push Frontend Docker Image
            uses: docker/build-push-action@v5
            with:
              context: ./frontend-react
              push: true
              # tags: fishlo/fishlo-docker-frontend-react:latest
              tags: |
                fishlo/fishlo-docker-frontend-react:latest
                fishlo/fishlo-docker-frontend-react:${{ github.sha }}
              cache-from: type=registry,ref=fishlo/fishlo-docker-frontend-react:latest
              cache-to: type=inline
              build-args: |
                VITE_SERVER_BASE_URL=${{ secrets.VITE_SERVER_BASE_URL }}
                VITE_MAPS_API_KEY=${{ secrets.VITE_MAPS_API_KEY }}

  update_ssh_linode:
    name: Pull Image and Deploy to Linode
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          script: |
            set -e

            cd /opt/fishlo

            echo "Pulling latest images..."
            docker compose pull || { echo "Pull failed. Aborting."; exit 1; }

            echo "Restarting updated services..."
            docker compose up -d --no-deps backend celery_worker celery_beat frontend nginx

            echo "Cleaning unused images..."
            docker image prune -f
            docker system prune -a -f

            echo "Deployment completed!"