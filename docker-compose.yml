version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4-alpine  
    container_name: fishlo_db
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Fishlo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fishlo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    # build: ./backend-django
    image: fishlo/fishlo-docker-backend-django:latest
    restart: unless-stopped
    container_name: fishlo_backend
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=django-db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # CHANGED: Use bind mounts instead of named volumes
      - ./backend-django/static:/app/static
      - ./backend-django/media:/app/media
      - ./backend-django/logs:/app/logs
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn fishlo_main.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 180"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery_worker:
    # build: ./backend-django
    image: fishlo/fishlo-docker-backend-django:latest
    restart: unless-stopped
    container_name: fishlo_celery_worker
    env_file:
      - .env.production
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=django-db
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # CHANGED: Use bind mount
      - ./backend-django/media:/app/media
      - ./backend-django/logs:/app/logs
    command: >
      sh -c "sleep 10 &&
             celery -A fishlo_main worker --loglevel=info --concurrency=2"

  celery_beat:
    # build: ./backend-django
    image: fishlo/fishlo-docker-backend-django:latest
    restart: unless-stopped
    container_name: fishlo_celery_beat
    env_file:
      - .env.production
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=django-db
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-django/logs:/app/logs
    command: >
      sh -c "sleep 15 &&
             celery -A fishlo_main beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"

  nginx:
    image: nginx:alpine
    container_name: fishlo_nginx
    ports:
      - "80:80"
      - "8000:8000"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      # CHANGED: Use bind mounts to access host files directly
      - ./backend-django/static:/app/static:ro
      - ./backend-django/media:/app/media:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
        backend:
          condition: service_healthy
        frontend:
          condition: service_started
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: fishlo_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  # frontend:
  #   build:
  #     # context: ./frontend-react
  #     image: fishlo/fishlo-docker-frontend-react:latest
  #     restart: unless-stopped
  #     args:
  #       VITE_SERVER_BASE_URL: "https://fishlo.in/api/v1"
  #       VITE_MAPS_API_KEY: "AIzaSyBi3YqzFrU2WO9IxKjqYkVedPpFrREL4hw"
  #   container_name: fishlo_frontend
  #   expose:
  #     - "80"
  #   depends_on:
  #     - backend
  frontend:
    image: fishlo/fishlo-docker-frontend-react:latest
    container_name: fishlo_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local